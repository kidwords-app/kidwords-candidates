name: generate-images

on:
  workflow_dispatch:
    inputs:
      roundId:
        description: "Batch round id (YYYY-MM-DD)"
        required: false
  schedule:
    - cron: "0 6 * * *"

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout candidates repo
        uses: actions/checkout@v4
        with:
          repository: kidwords-app/kidwords-candidates
          token: ${{ secrets.CANDIDATES_REPO_TOKEN }}
          fetch-depth: 0
          path: candidates-repo

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt
        working-directory: candidates-repo

      - name: Resolve round id
        id: round
        run: |
          if [ -n "${{ github.event.inputs.roundId }}" ]; then
            echo "roundId=${{ github.event.inputs.roundId }}" >> "$GITHUB_OUTPUT"
          else
            echo "roundId=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate images
        working-directory: candidates-repo
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ROUND_ID: ${{ steps.round.outputs.roundId }}
          CANDIDATES_REPO_PATH: .
        run: |
          set -euo pipefail
          python scripts/generate-images.py

      - name: Commit and push
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add candidates/rounds
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Generate images for ${{ steps.round.outputs.roundId }}"
          git push origin HEAD
        working-directory: candidates-repo

      - name: Email notification
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "generate-images ${{ steps.round.outputs.roundId }}: ${{ job.status }}"
          to: ${{ secrets.NOTIFY_EMAIL_TO }}
          from: ${{ secrets.NOTIFY_EMAIL_FROM }}
          body: |
            Workflow: ${{ github.workflow }}
            Status: ${{ job.status }}
            Round: ${{ steps.round.outputs.roundId }}
            Repo: ${{ github.repository }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}